<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Classroom</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com">
    <style>
        :root { --red: #ff0000; --black: #000000; --dark-gray: #1a1a1a; --white: #ffffff; --yellow: #ffff00; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--black); height: 100vh; overflow: hidden; }
        
        #main-app { display: flex; height: 100vh; width: 100vw; flex-direction: row; }
        
        /* Main Browsing Area (Left) */
        #content-area { flex-grow: 1; display: flex; flex-direction: column; background: #fff; }
        #address-bar { background: #222; padding: 8px; display: flex; gap: 10px; border-bottom: 1px solid var(--red); }
        #url-input { flex-grow: 1; background: #000; color: #fff; border: 1px solid var(--red); padding: 5px; border-radius: 4px; }

        /* Spyder Sidebar (Right - Extension Style) */
        #spyder-sidebar { width: 300px; background: var(--black); border-left: 2px solid var(--red); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; transition: 0.2s; }
        #spyder-sidebar.hidden { width: 0; padding: 0; border: none; opacity: 0; pointer-events: none; }
        
        h2 { color: var(--red); text-align: center; font-size: 1.5rem; margin: 0 0 20px 0; text-shadow: 0 0 10px var(--red); }
        .section-label { color: var(--yellow); font-size: 0.7rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; margin-top: 15px; }
        
        .nav-tab { background: var(--red); color: var(--black); padding: 12px; margin: 5px 0; cursor: pointer; border-radius: 4px; font-weight: bold; border: none; text-align: left; width: 100%; transition: 0.2s; }
        .nav-tab:hover { background: var(--white); }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="main-app">
        <!-- Browsing Window -->
        <div id="content-area">
            <div id="address-bar">
                <input type="text" id="url-input" placeholder="Enter URL (e.g. google.com)" onkeydown="if(event.key==='Enter') navigate(this.value)">
                <button onclick="navigate(document.getElementById('url-input').value)" style="background:var(--red); color:white; border:none; padding:5px 15px; cursor:pointer; border-radius:4px;">Go</button>
            </div>
            <iframe id="main-frame" src="https://www.google.com"></iframe>
        </div>

        <!-- Spyder Sidebar -->
        <div id="spyder-sidebar">
            <h2>SpyderSammy</h2>
            
            <div class="section-label">Apps</div>
            <button class="nav-tab" onclick="openApp('https://takaiwebsite.neocities.org')">Minecraft</button>
            <button class="nav-tab" onclick="ytBypass()">YouTube</button>

            <div class="section-label">Chrome Tabs (Quick Access)</div>
            <button class="nav-tab" style="background:#333; color:white;" onclick="navigate('https://classroom.google.com')">Google Classroom</button>
            <button class="nav-tab" style="background:#333; color:white;" onclick="navigate('https://docs.google.com')">Google Docs</button>
            <button class="nav-tab" style="background:#333; color:white;" onclick="navigate('https://clever.com')">Clever Portal</button>

            <p style="color:var(--yellow); font-size:0.6rem; margin-top:auto; text-align:center;">
                PANIC: ` | RESTORE: Ctrl + /
            </p>
        </div>
    </div>

    <script>
        // Navigate the main browsing frame
        function navigate(url) {
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('main-frame').src = url;
            document.getElementById('url-input').value = url;
        }

        // Open app in the main frame
        function openApp(url) {
            navigate(url);
        }

        // YouTube Bypass Logic
        function ytBypass() {
            let url = prompt("Enter YouTube Video URL:");
            if (url) {
                let bypassed = url.replace("youtube.com", "yout-ube.com");
                navigate(bypassed);
            }
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            // Panic Key: `
            if (e.key === '`') {
                document.getElementById('spyder-sidebar').classList.add('hidden');
                navigate("https://classroom.google.com");
            }
            // Restore Key: Ctrl + /
            if (e.ctrlKey && e.key === '/') {
                e.preventDefault();
                document.getElementById('spyder-sidebar').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
