<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Classroom</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com">
    <style>
        :root { --red: #ff0000; --black: #000000; --white: #ffffff; --yellow: #ffff00; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--black); color: var(--white); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #hero-screen { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
        
        #hero-screen h1 { 
            font-size: clamp(3rem, 10vw, 6rem); 
            color: var(--red); 
            text-shadow: 0 0 20px var(--red); 
            font-weight: 900; 
            animation: fullPulse 2s ease-in-out infinite; 
            margin-bottom: 40px; 
        }
        @keyframes fullPulse { 
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px var(--red); } 
            50% { transform: scale(1.08); text-shadow: 0 0 40px var(--red); } 
        }
        
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .btn { background: var(--red); color: var(--black); padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background: var(--white); transform: translateY(-2px); }
        .btn-yellow { background: var(--yellow); margin-top: 10px; }
    </style>
</head>
<body>

    <div id="hero-screen">
        <h1>SpyderSammy</h1>
        <div class="controls">
            <button class="btn" onclick="launchBlob('https://www.google.com')">Open Cloaked Browser</button>
            <button class="btn" onclick="launchBlob('https://takaiwebsite.neocities.org')">Minecraft</button>
            <button class="btn btn-yellow" onclick="spyderBlank()">Open Dashboard in About:Blank</button>
        </div>
    </div>

    <script>
        // Store the original HTML to reload for the 'Home' button
        const originalURL = window.location.href;

        function launchBlob(url) {
            const blobHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Home - Classroom</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
                        #taskbar { height: 40px; background: #111; display: flex; align-items: center; padding: 0 10px; gap: 10px; border-bottom: 1px solid #ff0000; }
                        #taskbar input { flex-grow: 1; background: #000; color: #fff; border: 1px solid #ff0000; padding: 5px; border-radius: 4px; outline: none; }
                        .nav-btn { background: #ff0000; color: #000; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
                        .home-btn { background: #ffff00; }
                        iframe { width: 100%; height: calc(100% - 41px); border: none; background: #fff; }
                    </style>
                </head>
                <body>
                    <div id="taskbar">
                        <button class="nav-btn home-btn" onclick="window.location.href='${originalURL}'">HOME</button>
                        <button class="nav-btn" onclick="document.getElementById('f').contentWindow.history.back()">BACK</button>
                        <button class="nav-btn" onclick="document.getElementById('f').contentWindow.history.forward()">NEXT</button>
                        <input type="text" id="addr" placeholder="Type URL and press Enter..." value="${url}">
                        <button class="nav-btn" onclick="nav()">GO</button>
                    </div>
                    <iframe id="f" src="${url}"></iframe>
                    <script>
                        const f = document.getElementById('f');
                        const addr = document.getElementById('addr');
                        function nav() {
                            let u = addr.value;
                            if(!u.startsWith('http')) u = 'https://' + u;
                            f.src = u;
                        }
                        addr.addEventListener('keypress', (e) => { if(e.key === 'Enter') nav(); });
                        window.addEventListener('keydown', (e) => {
                            if (e.key === '\`') { window.location.href = "https://classroom.google.com"; }
                        });
                    <\/script>
                </body>
                </html>
            `;

            const blob = new Blob([blobHTML], { type: 'text/html' });
            const blobURL = URL.createObjectURL(blob);
            window.location.href = blobURL; 
        }

        function spyderBlank() {
            const win = window.open('about:blank', '_blank');
            if (win) {
                win.document.write(document.documentElement.outerHTML);
                win.document.close();
                // Redirect original page to look innocent
                window.location.replace("https://google.com");
            } else {
                alert("Please allow popups to open the cloaked dashboard!");
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === '`') {
                window.open("https://classroom.google.com", "_blank");
                window.location.replace("https://google.com");
            }
        });
    </script>
</body>
</html>
