<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Classroom</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com">
    <style>
        :root { --red: #ff0000; --black: #000000; --white: #ffffff; --yellow: #ffff00; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--black); color: var(--white); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Hero Homepage */
        #hero-screen { text-align: center; }
        #hero-screen h1 { font-size: 6rem; color: var(--red); text-shadow: 0 0 30px var(--red); font-weight: 900; animation: pulse 2s infinite; margin: 0; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .controls { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; width: 300px; }
        .btn { background: var(--red); color: var(--black); padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: var(--white); transform: translateY(-3px); }
        .btn-yellow { background: var(--yellow); }
        
        #url-box { background: #111; border: 1px solid var(--red); padding: 10px; border-radius: 5px; color: white; width: 100%; box-sizing: border-box; }
        p { color: var(--yellow); font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="hero-screen">
        <h1>SpyderSammy</h1>
        
        <div class="controls">
            <input type="text" id="url-box" placeholder="Enter URL to Blob-Launch...">
            <button class="btn" onclick="launchBlob(document.getElementById('url-box').value)">Launch URL (Blob)</button>
            <button class="btn" onclick="launchBlob('https://takaiwebsite.neocities.org')">Minecraft</button>
            <button class="btn" onclick="ytBypass()">YouTube Proxy</button>
            <button class="btn btn-yellow" onclick="openAboutBlank()">Open in About:Blank</button>
        </div>

        <p>PANIC: ` (Opens Real Classroom) | Blob Mode Active</p>
    </div>

    <script>
        // Blob Technique: Wraps the site in a local memory URL to hide from iBoss
        function launchBlob(url) {
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;

            const content = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Home - Classroom</title>
                    <style>body,html,iframe{margin:0;padding:0;height:100%;width:100%;overflow:hidden;border:none;}</style>
                </head>
                <body>
                    <iframe src="${url}"></iframe>
                </body>
                </html>
            `;

            const blob = new Blob([content], { type: 'text/html' });
            const blobURL = URL.createObjectURL(blob);
            window.location.href = blobURL;
        }

        // About:Blank Cloaking: Opens the site in a completely empty tab that says about:blank
        function openAboutBlank() {
            let url = prompt("Enter URL for About:Blank Cloak:");
            if (!url) return;
            if (!url.startsWith('http')) url = 'https://' + url;

            const win = window.open('about:blank', '_blank');
            win.document.body.innerHTML = `<iframe src="${url}" style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;"></iframe>`;
            win.document.title = "Home - Classroom";
        }

        // YouTube Proxy
        function ytBypass() {
            let url = prompt("Paste YouTube URL:");
            if (url) launchBlob(url.replace("youtube.com", "yout-ube.com"));
        }

        // Panic Key: ` opens a real Google Classroom tab immediately
        window.addEventListener('keydown', (e) => {
            if (e.key === '`') {
                window.open("https://classroom.google.com", "_blank");
                // Immediately switch current page to something boring
                window.location.href = "https://google.com";
            }
        });
    </script>
</body>
</html>
