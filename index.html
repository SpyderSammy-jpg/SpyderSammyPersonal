<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpyderSammy</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --red: #ff0000; --black: #000000; --dark-gray: #1a1a1a; --white: #ffffff; --yellow: #ffff00; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--black); color: var(--white); height: 100vh; overflow: hidden; }
        
        /* Auth Screen Styling */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #330000 0%, #000000 100%); text-align: center; }
        #auth-screen h1 { font-size: 5rem; color: var(--red); text-shadow: 0 0 20px var(--red); margin-bottom: 20px; }
        .auth-container { background: rgba(0, 0, 0, 0.8); padding: 30px; border: 2px solid var(--red); border-radius: 15px; width: 300px; }
        .auth-container input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid var(--red); background: var(--dark-gray); color: white; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; font-size: 1rem; cursor: pointer; border: none; margin: 10px 0; border-radius: 5px; font-weight: bold; transition: 0.3s; background: var(--red); color: var(--white); }
        .btn-red:hover { background: var(--white); color: var(--red); }
        .toggle-link { color: var(--yellow); cursor: pointer; text-decoration: underline; font-size: 0.9rem; }

        /* App Layout */
        #main-app { display: none; height: 100vh; }
        #sidebar { width: 250px; background: var(--black); border-right: 2px solid var(--red); display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        #content-area { flex-grow: 1; background: var(--white); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .section-label { color: var(--yellow); font-size: 0.8rem; margin: 15px 0 5px 5px; text-transform: uppercase; }
        .nav-tab { background: var(--red); color: var(--black); padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 4px; font-weight: bold; border: none; text-align: left; width: 100%; }
        .nav-tab:hover { background: var(--white); }
    </style>
</head>
<body>

    <!-- AUTH SCREEN (Login/Signup) -->
    <div id="auth-screen">
        <h1 id="brand-title">SpyderSammy</h1>
        
        <!-- Login Form -->
        <div id="login-form" class="auth-container">
            <h2 style="color: var(--red)">Login</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn-red" onclick="login()">LOGIN</button>
            <p>New? <span class="toggle-link" onclick="toggleAuth()">Sign up here</span></p>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="auth-container" style="display: none;">
            <h2 style="color: var(--red)">Sign Up</h2>
            <input type="text" id="signup-user" placeholder="Choose Username">
            <input type="password" id="signup-pass" placeholder="Choose Password">
            <button class="btn-red" onclick="signup()">SIGN UP</button>
            <p>Have an account? <span class="toggle-link" onclick="toggleAuth()">Login here</span></p>
        </div>
    </div>

    <!-- MAIN APP UI (Remains same structure) -->
    <div id="main-app">
        <div id="sidebar">
            <h2 style="color: var(--red); text-align: center;">SpyderSammy</h2>
            <div id="sidebar-content"></div>
            <button class="nav-tab" style="background: var(--yellow); margin-top: auto;" onclick="showCreatePopup()">+ CREATE TAB</button>
            <button class="nav-tab" style="background: #444; color: #fff;" onclick="location.reload()">LOGOUT</button>
        </div>
        <div id="content-area">
            <iframe id="view-frame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Persistent User Storage
        const getUsers = () => JSON.parse(localStorage.getItem('spyderUsers')) || { "Sharvesh": "00010698" };
        const saveUsers = (users) => localStorage.setItem('spyderUsers', JSON.stringify(users));

        function toggleAuth() {
            const isLogin = document.getElementById('login-form').style.display !== 'none';
            document.getElementById('login-form').style.display = isLogin ? 'none' : 'block';
            document.getElementById('signup-form').style.display = isLogin ? 'block' : 'none';
        }

        function signup() {
            const user = document.getElementById('signup-user').value.trim();
            const pass = document.getElementById('signup-pass').value;
            const users = getUsers();

            if (!user || !pass) return alert("Fill all fields!");
            if (users[user]) return alert("Username already taken!");

            users[user] = pass;
            saveUsers(users);
            alert("Account created! You can now log in.");
            toggleAuth();
        }

        function login() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;
            const users = getUsers();

            if (users[user] === pass) {
                currentUser = { name: user, pass: pass };
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                renderSidebar();
            } else {
                alert("Invalid username or password!");
            }
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-content');
            container.innerHTML = '';
            
            // Sections & Tabs (Logic from previous prompt)
            addSection(container, "Common");
            addTab(container, "Google Classroom", "https://classroom.google.com");
            addTab(container, "Clever", "https://clever.com");
            addTab(container, "Google Docs", "https://docs.google.com");
            
            if (currentUser.pass === "222" || currentUser.pass === "00010698") {
                addSection(container, "222");
                addTab(container, "HR 222 Website", "https://sites.google.com");
            }

            if (currentUser.pass === "00010698") {
                addSection(container, "Personal");
                addTab(container, "Minecraft", "https://takaiwbsite.neocities.org");
                addSection(container, "Testing");
                addTab(container, "Proxy", "about:blank");
            }
        }

        function addSection(parent, label) {
            const div = document.createElement('div');
            div.className = 'section-label';
            div.innerText = label;
            parent.appendChild(div);
        }

        function addTab(parent, name, url) {
            const btn = document.createElement('button');
            btn.className = 'nav-tab';
            btn.innerText = name;
            btn.onclick = () => document.getElementById('view-frame').src = url;
            parent.appendChild(btn);
        }
    </script>
</body>
</html>
